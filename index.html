<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Expert Bd - Alpha Ariyan</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <style>
    :root {
      --primary: #ff0055; /* Cyber Pink */
      --secondary: #00f2ff; /* Cyber Cyan */
      --bg: #050505;
      --panel: rgba(15, 15, 20, 0.85);
      --text: #e0e0e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Chakra Petch', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* New Animated Background */
    .bg-anim {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #1a0510, #050505);
      z-index: -1;
    }

    .container { width: min(500px, 95%); margin: 50px auto; text-align: center; }

    .profile-box {
      border: 2px solid var(--primary);
      padding: 20px;
      border-radius: 30px;
      background: var(--panel);
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
      margin-bottom: 30px;
    }

    .name-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: var(--secondary);
      text-transform: uppercase;
      margin-top: 15px;
    }

    .subtitle { color: var(--primary); font-weight: bold; letter-spacing: 2px; }

    .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .btn {
      text-decoration: none;
      color: white;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      display: flex; flex-direction: column; align-items: center;
    }

    .btn:hover { background: var(--primary); border-color: white; transform: translateY(-5px); }

    textarea, select, input {
      width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px;
      background: #111; border: 1px solid #333; color: white;
    }

    .submit-btn {
      width: 100%; padding: 15px; margin-top: 20px;
      background: var(--secondary); color: black; font-weight: bold;
      border: none; border-radius: 10px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bg-anim"></div>
  <div class="container">
    <div class="profile-box">
      <h1 class="name-title">Alpha Ariyan</h1>
      <p class="subtitle">CYBER EXPERT BD</p>
    </div>

    <div class="social-grid">
      <a href="https://www.facebook.com/share/18hmpjCquP/" class="btn"><i class="fa-brands fa-facebook"></i> Facebook</a>
      <a href="https://www.instagram.com/aplha.ariyan?igsh=MTNlYWpkN3djdDc3dA==" class="btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
      <a href="https://www.tiktok.com/@alpha_ariyan0?_r=1&_t=ZS-97T9NHipH20" class="btn"><i class="fa-brands fa-tiktok"></i> TikTok</a>
      <a href="https://t.me/+WxMpXF5jF-5kMjFl" class="btn"><i class="fa-brands fa-telegram"></i> Telegram</a>
    </div>

    <form id="supportForm" style="margin-top: 30px;">
      <select id="service" required>
        <option value="">Select Service</option>
        <option>Account Recovery</option>
        <option>Security Check</option>
      </select>
      <textarea id="problem" placeholder="Describe your problem..." required></textarea>
      <button type="submit" class="submit-btn">Send to WhatsApp</button>
    </form>
  </div>

  <script>
    document.getElementById("supportForm").addEventListener("submit", function(e){
      e.preventDefault();
      const service = document.getElementById("service").value;
      const problem = document.getElementById("problem").value;
      const url = `https://wa.me/8801999991028?text=Service: ${service}%0AProblem: ${problem}`;
      window.open(url, "_blank");
    });
  </script>
</body>
        </html>
