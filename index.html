<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Hacker Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: 'Orbitron', sans-serif;
  overflow-x: hidden;
  color: white;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN CONTAINER */
.container {
  width: 95%;
  max-width: 500px;
  margin: auto;
  text-align: center;
  padding-top: 40px;
}

/* PROFILE IMAGE */
.profile {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 4px solid #00ffcc;
  box-shadow: 0 0 25px #00ffcc, 0 0 50px #ff003c;
  object-fit: cover;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 15px #00ffcc; }
  50% { box-shadow: 0 0 35px #ff003c; }
  100% { box-shadow: 0 0 15px #00ffcc; }
}

/* NAME GLITCH */
.name {
  font-size: 28px;
  margin-top: 15px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #ff003c;
  position: relative;
}

.name::before,
.name::after {
  content: "Alpha Ariyan";
  position: absolute;
  left: 0;
  width: 100%;
  overflow: hidden;
}

.name::before {
  color: #ff003c;
  animation: glitch 2s infinite;
}

.name::after {
  color: #00ffff;
  animation: glitch 1.5s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-1px,1px); }
  100% { transform: translate(0); }
}

/* SOCIAL BUTTONS */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 25px;
}

.btn {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #00ffcc;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #ff003c;
  transform: scale(1.05);
}

/* FORM */
select, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #111;
  border: 1px solid #00ffcc;
  color: white;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
}

button:hover {
  background: #ff003c;
  color: white;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

  <!-- PROFILE IMAGE -->
  <img class="profile" src="https://i.ibb.co.com/G4jVV53d/IMG-20260624-WA0022.jpg" />

  <!-- NAME -->
  <div class="name">Alpha Ariyan</div>

  <p style="color:#00ffcc;">CYBER HACKER BD</p>

  <!-- SOCIAL -->
  <div class="grid">
    <a class="btn" href="https://www.facebook.com/share/18hmpjCquP/"><i class="fa-brands fa-facebook"></i> Facebook</a>
    <a class="btn" href="https://www.instagram.com/aplha.ariyan?igsh=MTNlYWpkN3djdDc3dA=="><i class="fa-brands fa-instagram"></i> Instagram</a>
    <a class="btn" href="https://www.tiktok.com/@alpha_ariyan0?_r=1&_t=ZS-97T9NHipH20"><i class="fa-brands fa-tiktok"></i> TikTok</a>
    <a class="btn" href="https://t.me/+WxMpXF5jF-5kMjFl"><i class="fa-brands fa-telegram"></i> Telegram</a>
  </div>

  <!-- FORM -->
  <form id="supportForm">
    <select id="service" required>
      <option value="">Select Service</option>
      <option>Account Recovery</option>
      <option>Security Check</option>
    </select>

    <textarea id="problem" placeholder="Write your issue..." required></textarea>

    <button type="submit">Send to WhatsApp</button>
  </form>

</div>

<script>
document.getElementById("supportForm").addEventListener("submit", function(e){
  e.preventDefault();
  const service = document.getElementById("service").value;
  const problem = document.getElementById("problem").value;

  const url = `https://wa.me/8801999991028?text=Service:${service}%0AProblem:${problem}`;
  window.open(url, "_blank");
});

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++)
  drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 35);
</script>

</body>
</html>
